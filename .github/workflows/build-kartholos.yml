name: Build KartholOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Yocto Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk wget git diffstat unzip texinfo gcc build-essential \
          chrpath socat cpio python3 python3-pip python3-pexpect xz-utils debianutils \
          iputils-ping python3-git python3-jinja2 libegl1-mesa libsdl1.2-dev \
          pylint xterm python3-subunit mesa-common-dev zstd liblz4-tool

      - name: Setup Yocto (Poky)
        run: |
          git clone -b scarthgap git://git.yoctoproject.org/poky
          cd poky
          git clone -b scarthgap git://git.yoctoproject.org/meta-qt6
          git clone -b scarthgap git://git.openembedded.org/meta-openembedded

      - name: Initialize Build Environment
        run: |
          source poky/oe-init-build-env build
          echo 'MACHINE = "qemux86-64"' >> conf/local.conf
          echo 'DISTRO_FEATURES:append = " wayland opengl systemd"' >> conf/local.conf
          echo 'VIRTUAL-RUNTIME_init_manager = "systemd"' >> conf/local.conf
          echo 'BBLAYERS += " ${TOPDIR}/../meta-kartholos "' >> conf/bblayers.conf
          echo 'BBLAYERS += " ${TOPDIR}/../poky/meta-qt6 "' >> conf/bblayers.conf
          echo 'BBLAYERS += " ${TOPDIR}/../poky/meta-openembedded/meta-oe "' >> conf/bblayers.conf

      - name: BitBake Build
        run: |
          source poky/oe-init-build-env build
          bitbake kartholos-image-qt6

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kartholos-image
          path: build/tmp/deploy/images/qemux86-64/kartholos-image-qt6-qemux86-64.iso
