name: Build KartholOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get clean
          df -h

      - name: Check Disk Space
        run: df -h

      - name: Install Yocto Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping python3-git python3-jinja2 \
            libegl1-mesa libsdl1.2-dev xterm \
            mesa-common-dev zstd liblz4-tool file libacl1

      - name: Cache Yocto downloads and sstate
        uses: actions/cache@v4
        with:
          path: |
            build/downloads
            build/sstate-cache
          key: yocto-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            yocto-${{ runner.os }}-

      - name: Setup Yocto Layers
        run: |
          git clone -b scarthgap https://git.yoctoproject.org/poky
          git clone -b scarthgap https://git.openembedded.org/meta-openembedded

      - name: Initialize Build Environment
        run: |
          source poky/oe-init-build-env build

          # Remove bad previous entries if workflow reruns
          sed -i '/^MACHINE =/d' conf/local.conf

          echo 'MACHINE = "qemux86-64"' >> conf/local.conf
          echo 'DISTRO_FEATURES:append = " systemd pam usrmerge"' >> conf/local.conf
          echo 'IMAGE_FSTYPES:append = " iso"' >> conf/local.conf
          echo 'VIRTUAL-RUNTIME_init_manager = "systemd"' >> conf/local.conf
          echo 'BB_NUMBER_THREADS = "4"' >> conf/local.conf
          echo 'PARALLEL_MAKE = "-j4"' >> conf/local.conf
          echo 'INHERIT += "rm_work"' >> conf/local.conf

          bitbake-layers add-layer ../meta-openembedded/meta-oe
          bitbake-layers add-layer ../meta-openembedded/meta-python
          bitbake-layers add-layer ../meta-openembedded/meta-networking
          bitbake-layers add-layer ../meta-openembedded/meta-filesystems
          bitbake-layers add-layer ../meta-kartholos

      - name: Build KartholOS Image
        run: |
          source poky/oe-init-build-env build
          # Monitor disk space in background during build
          (while true; do df -h /; sleep 600; done) &
          bitbake kartholos-image-minimal

      - name: Check Final Disk Space
        run: df -h

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kartholos-image-minimal
          path: build/tmp/deploy/images/qemux86-64/*.iso
